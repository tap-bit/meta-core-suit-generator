<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Core Suit Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
        .container { max-width: 650px; margin: 40px auto; background: #161616; padding: 30px; border-radius: 10px; border: 1px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        h1 { color: #00ff88; text-align: center; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 30px; }
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #888; font-size: 0.8rem; text-transform: uppercase; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #222; color: #00ff88; font-family: monospace; box-sizing: border-box; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { background: #222; padding: 12px; border-radius: 5px; display: flex; align-items: center; border: 1px solid #333; cursor: pointer; transition: 0.2s; }
        .opt:hover { border-color: #00ff88; }
        .opt input { margin-right: 12px; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; border-radius: 5px; font-weight: bold; color: #000; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        button:hover { background: #00cc6e; box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <h1>Meta Core System: Suit Fabricator</h1>
    
    <div class="section">
        <label>Suit Identifier (e.g., mark_85)</label>
        <input type="text" id="suitId" placeholder="template_suit" value="template_suit">
    </div>

    <div class="section">
        <label>Functionality Toggles</label>
        <div class="options-grid">
            <label class="opt"><input type="checkbox" id="isNano"> Nano-Tech Animation</label>
            <label class="opt"><input type="checkbox" id="hasCape"> Enable Cape Animation</label>
            <label class="opt"><input type="checkbox" id="allowMask" checked> Allow Mask Toggle</label>
            <label class="opt"><input type="checkbox" id="allowHood" checked> Allow Hood Toggle</label>
            <label class="opt"><input type="checkbox" id="allowSuitOff" checked> Allow Suit Off</label>
        </div>
    </div>

    <button onclick="downloadFiles()">GENERATE JSON FILE</button>
</div>

<script>
    function generateAttachable(config) {
        const suitId = config.id;
        const isNano = config.isNano;
        
        // Setup Textures
        let textures = { "enchanted": "textures/misc/enchanted_item_glint" };
        if (isNano) {
            for (let i = 0; i <= 7; i++) {
                textures[`nano_${i}`] = `textures/entity/suits/templates/suits/example_nano/${suitId}_${i}`;
            }
        } else {
            textures["default"] = `textures/entity/suits/templates/suits/${suitId}`;
        }

        // Variable Locking Logic
        let preAnimation = [
            `variable.hood = ${config.allowHood ? "query.property('suit:hood_state')" : "0"};`,
            `variable.mask = ${config.allowMask ? "query.property('suit:mask_state')" : "0"};`,
            `variable.hidden = ${config.allowSuitOff ? "query.property('suit:hidden')" : "0"};`
        ];

        if (isNano) {
            preAnimation.push(
                "variable.nano_state = query.property('suit:toggle_anim_suit');",
                "variable.nano_timer = math.clamp((variable.nano_timer ?? 0) + (variable.nano_state ? query.delta_time * 12 : -query.delta_time * 12), 0, 7.9);",
                "variable.nano_tex_index = math.floor(variable.nano_timer);"
            );
        }

        const attachableJson = {
            "format_version": "1.21.0",
            "minecraft:attachable": {
                "description": {
                    "identifier": `suit:${suitId}`,
                    "materials": { 
                        "default": "entity_emissive_alpha", 
                        "enchanted": "armor_enchanted" 
                    },
                    "textures": textures,
                    "geometry": { "default": `geometry.${suitId}` },
                    "animations": {
                        "suit_logic": `controller.animation.${suitId}`,
                        "mask_off": "animation.suit.mask_off",
                        "hood_down": "animation.suit.hood_down",
                        "suit_off": "animation.suit.suit_off",
                        "cape": "animation.suit.cape"
                    },
                    "scripts": {
                        "pre_animation": preAnimation,
                        "animate": [
                            "suit_logic",
                            config.hasCape ? { "cape": "variable.last_g = (query.is_on_ground ? query.life_time : (variable.last_g ?? query.life_time)); return query.modified_move_speed > 0.01 && (query.life_time - variable.last_g < 0.6 || !query.is_sprinting);" } : null
                        ].filter(Boolean)
                    },
                    "render_controllers": [isNano ? "controller.render.nano_suit_template" : "controller.render.suit_template"]
                }
            }
        };

        return JSON.stringify(attachableJson, null, 2);
    }

    function downloadFiles() {
        const suitName = document.getElementById('suitId').value || 'template_suit';
        const config = {
            id: suitName,
            isNano: document.getElementById('isNano').checked,
            hasCape: document.getElementById('hasCape').checked,
            allowMask: document.getElementById('allowMask').checked,
            allowHood: document.getElementById('allowHood').checked,
            allowSuitOff: document.getElementById('allowSuitOff').checked
        };

        const content = generateAttachable(config);
        const blob = new Blob([content], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${suitName}.json`; // Simple naming: suit_name.json
        link.click();
    }
</script>

</body>
</html>
